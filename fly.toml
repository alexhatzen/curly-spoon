# Fly.io app config. Run `fly launch --no-deploy` first to generate the
# app name/region for your account, then merge those values in here
# (or let `fly launch` overwrite this file and re-add the [mounts] and
# [env] sections below if it strips them).

app = "your-fishlog-app"   # <-- change to the name fly gives/you choose
primary_region = "iad"      # <-- change to the region you picked

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/fishing.db"

[[mounts]]
  source = "fishlog_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
