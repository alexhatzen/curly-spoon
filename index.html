<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing Log</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

  <header class="app-header">
    <h1>🎣 Fishing Log</h1>
    <nav class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="dashboard" role="tab" aria-selected="true">Dashboard</button>
      <button class="tab-btn" data-tab="log" role="tab" aria-selected="false">Log a Catch</button>
      <button class="tab-btn" data-tab="catches" role="tab" aria-selected="false">All Catches</button>
    </nav>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">◐</button>
  </header>

  <main>

    <!-- DASHBOARD -->
    <section id="dashboard" class="tab-panel active">
      <div id="emptyState" class="empty-state" hidden>
        <p>No catches logged yet.</p>
        <button class="btn-primary" id="emptyStateCta">Log your first catch</button>
      </div>

      <div id="dashboardContent">
        <div class="stat-grid" id="statGrid"></div>

        <div class="chart-row">
          <div class="viz-root chart-card">
            <div class="chart-header">
              <h2>Catches by species</h2>
            </div>
            <div id="speciesChart" class="chart-body"></div>
            <div id="speciesLegend" class="legend"></div>
          </div>

          <div class="viz-root chart-card">
            <div class="chart-header">
              <h2>Catches over time</h2>
            </div>
            <div id="timeChart" class="chart-body"></div>
          </div>
        </div>

        <div class="viz-root chart-card">
          <div class="chart-header">
            <h2>Personal bests by species</h2>
          </div>
          <div class="table-wrap">
            <table class="data-table" id="bestsTable">
              <thead>
                <tr><th>Species</th><th>Heaviest</th><th>Longest</th><th>Total caught</th></tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <!-- LOG A CATCH -->
    <section id="log" class="tab-panel">
      <form id="catchForm" class="catch-form">
        <h2>Log a catch</h2>

        <div class="form-grid">
          <label class="field">
            <span>Species *</span>
            <input type="text" id="fSpecies" list="speciesList" required placeholder="e.g. Largemouth Bass">
            <datalist id="speciesList"></datalist>
          </label>

          <label class="field">
            <span>Date *</span>
            <input type="date" id="fDate" required>
          </label>

          <label class="field">
            <span>Weight (kg)</span>
            <input type="number" id="fWeight" min="0" step="0.01" placeholder="e.g. 2.0">
          </label>

          <label class="field">
            <span>Length (cm)</span>
            <input type="number" id="fLength" min="0" step="0.1" placeholder="e.g. 45">
          </label>

          <label class="field">
            <span>Location</span>
            <input type="text" id="fLocation" list="locationList" placeholder="e.g. Lake Travis">
            <datalist id="locationList"></datalist>
          </label>

          <label class="field">
            <span>Bait / Lure</span>
            <input type="text" id="fBait" placeholder="e.g. Spinnerbait">
          </label>

          <label class="field field-wide">
            <span>Notes</span>
            <textarea id="fNotes" rows="2" placeholder="Anything worth remembering about this one"></textarea>
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Save catch</button>
          <span class="form-msg" id="formMsg"></span>
        </div>
      </form>
    </section>

    <!-- ALL CATCHES -->
    <section id="catches" class="tab-panel">
      <div class="list-toolbar">
        <input type="search" id="searchInput" placeholder="Search species, location, notes…">
        <select id="sortSelect">
          <option value="date-desc">Newest first</option>
          <option value="date-asc">Oldest first</option>
          <option value="weight-desc">Heaviest first</option>
          <option value="length-desc">Longest first</option>
        </select>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="catchesTable">
          <thead>
            <tr>
              <th>Date</th><th>Species</th><th>Weight</th><th>Length</th><th>Location</th><th>Bait</th><th colspan="2"></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

  </main>

  <dialog id="editDialog" class="edit-dialog">
    <form id="editForm">
      <h2>Edit catch</h2>
      <input type="hidden" id="eId">

      <div class="form-grid">
        <label class="field">
          <span>Species *</span>
          <input type="text" id="eSpecies" list="speciesList" required>
        </label>

        <label class="field">
          <span>Date *</span>
          <input type="date" id="eDate" required>
        </label>

        <label class="field">
          <span>Weight (kg)</span>
          <input type="number" id="eWeight" min="0" step="0.01">
        </label>

        <label class="field">
          <span>Length (cm)</span>
          <input type="number" id="eLength" min="0" step="0.1">
        </label>

        <label class="field">
          <span>Location</span>
          <input type="text" id="eLocation" list="locationList">
        </label>

        <label class="field">
          <span>Bait / Lure</span>
          <input type="text" id="eBait">
        </label>

        <label class="field field-wide">
          <span>Notes</span>
          <textarea id="eNotes" rows="2"></textarea>
        </label>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Save changes</button>
        <button type="button" class="btn-secondary" id="editCancel">Cancel</button>
      </div>
    </form>
  </dialog>

</div>

<script src="js/app.js"></script>
</body>
</html>
